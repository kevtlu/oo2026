<!doctype html>
<html>
  <head>
    <title>Takisti</title>
    <script src="jada2.2.js"></script>
    <script>
        let r1, r2, sc1;
        function startPage(){
            r1=new Resistor("R1");  
            r2=new Resistor("R2");
            sc1=new SeriesConnection("SC1");
            sc1.addResistor(r1);
            sc1.addResistor(r2);  
            sc1.draw(canvas1.getContext("2d"), 10, 50);
        }
        function addResistor(rname){
            sc1.addResistor(new Resistor(rname));
            sc1.draw(canvas1.getContext("2d"), x, y);
        }
    </script>
    <meta charset="utf-8">
  </head>
  <body onload="startPage()">
      <canvas id="canvas1" width="400" height="100"></canvas><br />
      <input type="text" id="tnimetus" /><input type="button" value="lisa takisti" onclick="addResistor(tnimetus.value)" />
  </body>
</html>
