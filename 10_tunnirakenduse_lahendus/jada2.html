<!doctype html>
<html>
  <head>
    <title>Takisti</title>
    <script src="jada2.js"></script>
    <script>
        let r1, r2, r3, r4, r5, r6, r7, sc1, sc2, sc3, sc4;
        function startPage(){
            r1=new Resistor("R1");  
            r2=new Resistor("R2");
            r3=new Resistor("R3");
            r4=new Resistor("R4");
            r5=new Resistor("R5");
            r6=new Resistor("R6");
            r7=new Resistor("R7");
            sc1=new SeriesConnection("SC1");
            sc1.addResistor(r1);
            sc1.addResistor(r2);
            sc1.addResistor(r4);
            sc4=new SeriesConnection("SC4");
            sc4.addResistor(r7);
            sc3=new SeriesConnection("SC3");
            sc3.addResistor(r6);
            sc3.addResistor(sc4);
            sc2=new SeriesConnection("SC2");
            sc2.addResistor(sc1);
            sc2.addResistor(r3);
            sc2.addResistor(r5);
            sc2.addResistor(sc3);
            sc2.draw(canvas1.getContext("2d"), 10, 50);
        }
    </script>
    <meta charset="utf-8">
  </head>
  <body onload="startPage()">
      <canvas id="canvas1" width="400" height="100"></canvas><br />
  </body>
</html>
